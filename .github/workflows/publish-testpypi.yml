name: Build and Publish to TestPyPI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and publish from'
        required: true
        default: 'develop'
        type: string
      version:
        description: 'Package version (e.g. 1.0.0rc1). If empty, auto-generates <base>.devN'
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build-and-publish:
    runs-on:
      group: arc-ubuntu-sc-runners-prd-03
      labels: arc-ubuntu
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine packaging

      - name: Set version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python - <<'PY'
          import os
          import re
          from packaging.version import Version, InvalidVersion

          input_version = os.environ.get("INPUT_VERSION", "").strip()
          run_number = os.environ["RUN_NUMBER"]

          # Read base version from pyproject.toml
          with open("pyproject.toml", encoding="utf-8") as f:
              content = f.read()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          base_version = match.group(1) if match else "0.0.0"

          version = input_version if input_version else f"{base_version}.dev{run_number}"

          # Validate PEP 440
          try:
              Version(version)
          except InvalidVersion as exc:
              raise SystemExit(f"Invalid package version '{version}': {exc}")

          # Update pyproject.toml
          updated_content, count = re.subn(
              r'(?m)^version\s*=\s*"[^"]*"',
              f'version = "{version}"',
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not find version entry in pyproject.toml")

          with open("pyproject.toml", "w", encoding="utf-8") as f:
              f.write(updated_content)

          # Export version for downstream steps
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"VERSION={version}\n")

          print(f"Publishing version: {version}")
          PY

      - name: Build package
        run: python -m build

      - name: List build artifacts
        run: ls -la dist/

      - name: Check distribution
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-packages
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Verify package on TestPyPI
        run: |
          for i in 1 2 3 4 5 6; do
            echo "Attempt $i: checking TestPyPI for teradata-etl-mcp-server $VERSION..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://test.pypi.org/pypi/teradata-etl-mcp-server/$VERSION/json")
            if [ "$STATUS" = "200" ]; then
              echo "Package teradata-etl-mcp-server==$VERSION is available on TestPyPI"
              exit 0
            fi
            echo "Not yet available (HTTP $STATUS), retrying in 10s..."
            sleep 10
          done
          echo "ERROR: Package teradata-etl-mcp-server==$VERSION not found on TestPyPI after 60s"
          exit 1
